# Dependency & Supply-Chain pipeline — GitHub Actions (Flavor B: runs the PLUGIN)
#
# Drop this into a Java/Maven target repo at: .github/workflows/depscan.yml
#
# This workflow does NOT re-implement the pipeline as native steps. It installs Claude Code + the
# depscan plugin into the runner and invokes the plugin's orchestrator, **/depscan-pipeline**, which
# executes the entire flow itself:
#   Stage 1 scan  ->  Stage 2 risk score  ->  Stage 3 auto-remediation (one PR)  ->  Stage 4 gate.
# The steps below only PROVIDE THE TOOLCHAIN the plugin needs (Java, Maven, Syft, Grype) and the
# Linux MCP servers (github + jira) the agents call. Detection is resilient by design: the plugin
# reads pom.xml statically, so an unresolvable / typosquatted coordinate is reported, not fatal.
#
# Triggers:
#   • schedule (nightly)   -> mode "full": scan -> score -> remediate -> open/update fix PR -> gate
#   • pull_request         -> mode "gate-only": run only the Stage 4 gate on the PR
#   • workflow_dispatch    -> manual run (defaults to full)
#
# Required repo secrets:
#   ANTHROPIC_API_KEY   — drives Claude Code (the agents/skills)
#   NVD_API_KEY         — speeds up OWASP Dependency-Check's NVD sync
#   ATLASSIAN_API_TOKEN — Jira API token (only if you want Jira audit comments; else the jira MCP
#                         simply has no creds and Jira steps are skipped)
#   (GITHUB_TOKEN is provided automatically and feeds the github MCP server for PRs/reviews/issues.)
#
# The plugin repo is PUBLIC, so no token is needed to check it out.
# Governance: this workflow NEVER merges. Require a human review via branch protection.

name: depscan

on:
  schedule:
    - cron: "0 2 * * *"          # 02:00 UTC nightly — drift detection
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        type: choice
        default: "full"
        options:
          - full
          - gate-only

permissions:
  contents: write                 # plugin pushes the fix branch
  pull-requests: write            # plugin opens the PR / posts the gate review
  issues: write                   # plugin opens MAJOR_REVIEW / BUILD_BROKEN issues

concurrency:
  group: depscan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  depscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout depscan plugin (public)
        uses: actions/checkout@v4
        with:
          repository: sathiskumarperumal/dependency-supplychain-plugin
          path: .depscan-plugin

      - name: Set up Java + Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install scanners the plugin calls (Syft + Grype)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          syft version && grype version

      - name: Cache NVD database (warm OWASP Dependency-Check)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Load the plugin (project-scoped agents / skills / commands)
        run: |
          mkdir -p .claude
          cp -r .depscan-plugin/commands .claude/commands
          cp -r .depscan-plugin/agents   .claude/agents
          cp -r .depscan-plugin/skills   .claude/skills

      - name: Configure MCP servers for CI (Linux: github + jira)
        # The plugin's own .mcp.json is Windows-only (cmd /c ...). This Linux CI variant runs the
        # github + jira MCP servers via npx so the agents' mcp__github__* / mcp__jira__* tools resolve.
        run: cp .depscan-plugin/templates/github-actions/mcp.ci.json ./.mcp.json

      - name: Run the depscan pipeline (the plugin does everything)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # github MCP server auth (uses the auto GITHUB_TOKEN; swap to a PAT secret for cross-repo)
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # jira MCP server auth (optional — omit if you don't use Jira)
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          MODE: ${{ github.event_name == 'pull_request' && 'gate-only' || (github.event.inputs.mode || 'full') }}
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_ARG=""
          if [ "$EVENT" = "pull_request" ]; then PR_ARG="--pr $PR_NUMBER"; fi
          echo "Running: /depscan-pipeline . --mode $MODE $PR_ARG"
          # Headless, non-interactive: --mcp-config loads the github+jira servers; the orchestrator
          # runs Stage 1->4 and uses the MCP tools for all GitHub/Jira operations.
          claude -p "/depscan-pipeline . --mode $MODE $PR_ARG" \
            --mcp-config ./.mcp.json \
            --dangerously-skip-permissions \
            --output-format text

      - name: Upload pipeline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depscan-reports
          path: |
            depscan-report.json
            depscan-risk-report.json
            depscan-supplychain-audit.json
            target/sbom.cdx.json
          if-no-files-found: warn